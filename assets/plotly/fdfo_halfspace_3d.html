<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Half-Space — PSD Condition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#FAF8F5;color:#050532;overflow:hidden}
#container{width:100%;height:100vh;position:relative}
canvas{display:block}
.overlay{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(250,248,245,0.92);border:1.5px solid #e0ddd8;border-radius:10px;padding:10px 16px;text-align:center;pointer-events:none;max-width:420px}
.overlay h4{font:bold 13px/1.4 'Helvetica Neue',Arial,sans-serif;color:#18327E;margin-bottom:4px}
.overlay p{font:11px/1.5 'Helvetica Neue',Arial,sans-serif;color:#656C75;margin:0}
.legend{display:flex;gap:12px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font:11px/1 'Helvetica Neue',Arial,sans-serif;color:#656C75}
.legend-dot{width:10px;height:10px;border-radius:2px}
</style>
</head>
<body>
<div id="container"></div>
<div class="overlay">
  <h4>PSD Half-Space Condition</h4>
  <p>The true gradient ∇R defines a half-space. Jacobian-transformed gradients J·∇R that stay within 90° (blue) are valid descent directions. Those beyond 90° (orange-red) would ascend.</p>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#2979B9"></div>Valid (&lt;90°)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#E05D36"></div>Invalid (&gt;90°)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#18327E"></div>True ∇R</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ==========================================================
// Scene setup
// ==========================================================
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xFAF8F5);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(3.5, 2.5, 3.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;
controls.minDistance = 3;
controls.maxDistance = 8;
controls.minPolarAngle = Math.PI * 0.2;
controls.maxPolarAngle = Math.PI * 0.6;

// ==========================================================
// Colors (FPO palette)
// ==========================================================
const COL_VALID = 0x2979B9;    // steel blue
const COL_INVALID = 0xE05D36;  // warm orange-red
const COL_NAVY = 0x18327E;     // navy
const COL_DISC = 0xD8D4CC;     // light disc

// ==========================================================
// True gradient direction
// ==========================================================
const gradDir = new THREE.Vector3(0, 1, 0).normalize();

// ==========================================================
// Create thick arrow
// ==========================================================
function createArrow(dir, length, color, shaftRadius, headRadius, headLength) {
  shaftRadius = shaftRadius || 0.055;
  headRadius = headRadius || 0.14;
  headLength = headLength || 0.22;
  const shaftLength = length - headLength;

  const group = new THREE.Group();

  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(shaftRadius, shaftRadius, shaftLength, 12);
  shaftGeo.translate(0, shaftLength / 2, 0);
  const mat = new THREE.MeshBasicMaterial({ color });
  const shaft = new THREE.Mesh(shaftGeo, mat);
  group.add(shaft);

  // Head
  const headGeo = new THREE.ConeGeometry(headRadius, headLength, 12);
  headGeo.translate(0, shaftLength + headLength / 2, 0);
  const head = new THREE.Mesh(headGeo, mat);
  group.add(head);

  // Orient group to point along dir
  const up = new THREE.Vector3(0, 1, 0);
  if (Math.abs(dir.dot(up)) < 0.999) {
    const quat = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
    group.quaternion.copy(quat);
  } else if (dir.y < 0) {
    group.rotation.z = Math.PI;
  }

  return group;
}

// ==========================================================
// Main gradient arrow (navy, pointing up)
// ==========================================================
const mainArrow = createArrow(gradDir, 2.0, COL_NAVY, 0.065, 0.16, 0.28);
scene.add(mainArrow);

// Label "∇R" — using a sprite
function makeLabel(text, color, size) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  ctx.font = 'bold 36px "Helvetica Neue",Arial,sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(size, size * 0.5, 1);
  return sprite;
}

const gradLabel = makeLabel('∇R', COL_NAVY, 0.6);
gradLabel.position.set(0.25, 2.15, 0);
scene.add(gradLabel);

// ==========================================================
// Half-space disc (perpendicular to gradient at origin)
// ==========================================================
const discGeo = new THREE.CircleGeometry(2.2, 64);
const discMat = new THREE.MeshBasicMaterial({
  color: COL_DISC,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.45,
  polygonOffset: true,
  polygonOffsetFactor: 1,
  polygonOffsetUnits: 1,
});
const disc = new THREE.Mesh(discGeo, discMat);
disc.rotation.x = -Math.PI / 2;
scene.add(disc);

// Disc rim
const rimGeo = new THREE.RingGeometry(2.16, 2.24, 64);
const rimMat = new THREE.MeshBasicMaterial({
  color: COL_NAVY,
  side: THREE.DoubleSide,
  transparent: true,
  opacity: 0.7,
  polygonOffset: true,
  polygonOffsetFactor: -1,
  polygonOffsetUnits: -1,
});
const rim = new THREE.Mesh(rimGeo, rimMat);
rim.rotation.x = -Math.PI / 2;
rim.position.y = 0.001;
scene.add(rim);

// ==========================================================
// Scattered arrows — 3 valid, 3 invalid (hand-picked)
// ==========================================================
// Each entry: [polar angle from gradient (deg), azimuth (deg), length]
const arrowSpecs = [
  // Valid arrows (within 90° of gradient) — slightly longer to feel "strong"
  { polar: 20,  azimuth: 30,  length: 1.3, valid: true },
  { polar: 45,  azimuth: 160, length: 1.2, valid: true },
  { polar: 70,  azimuth: 280, length: 1.1, valid: true },
  // Invalid arrows (beyond 90°)
  { polar: 110, azimuth: 100, length: 1.0, valid: false },
  { polar: 140, azimuth: 220, length: 0.95, valid: false },
  { polar: 165, azimuth: 340, length: 0.9, valid: false },
];

const arrows = [];

for (const spec of arrowSpecs) {
  const theta = spec.polar * Math.PI / 180;   // polar angle from +Y
  const phi = spec.azimuth * Math.PI / 180;   // azimuth in XZ plane

  const dir = new THREE.Vector3(
    Math.sin(theta) * Math.cos(phi),
    Math.cos(theta),
    Math.sin(theta) * Math.sin(phi)
  ).normalize();

  const color = spec.valid ? COL_VALID : COL_INVALID;
  const arrow = createArrow(dir, spec.length, color);
  scene.add(arrow);
  arrows.push({ mesh: arrow, dir, angle: spec.polar, isValid: spec.valid });
}

// ==========================================================
// Animation loop
// ==========================================================
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ==========================================================
// Resize
// ==========================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
