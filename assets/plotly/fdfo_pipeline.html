<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDFO Post-Training Loop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #ffffff;
    color: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 6px 10px;
  }
  svg {
    display: block;
    width: 100%;
    max-width: 960px;
    height: auto;
  }
  .title {
    font-size: 20px;
    font-weight: 650;
    fill: #0f172a;
  }
  .subtitle {
    font-size: 12px;
    fill: #64748b;
  }
  .card-title {
    font-size: 16px;
    font-weight: 650;
  }
  .card-title-sm {
    font-size: 15px;
    font-weight: 650;
  }
  .card-sub {
    font-size: 12px;
    fill: #64748b;
  }
  .card-sub-light {
    font-size: 12px;
    fill: rgba(255, 255, 255, 0.8);
  }
  .chip {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<svg viewBox="0 0 960 208" xmlns="http://www.w3.org/2000/svg" aria-label="FDFO post-training loop">
  <defs>
    <marker id="arrow-slate" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
    <clipPath id="generated-thumb-clip">
      <rect x="558" y="72" width="56" height="56" rx="6"/>
    </clipPath>
  </defs>

  <text x="24" y="28" class="title">Post-Training Loop</text>
  <text x="24" y="46" class="subtitle">Sample → Score → update</text>

  <rect x="24" y="64" width="160" height="82" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="38" y="82" width="60" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="104" y="82" width="52" height="22" rx="11" fill="#e2e8f0"/>
  <text x="68" y="97" text-anchor="middle" class="chip" fill="#334155">prompt c</text>
  <text x="130" y="97" text-anchor="middle" class="chip" fill="#334155">noise x₀</text>
  <text x="104" y="124" text-anchor="middle" class="card-sub">Draw a sample to roll out</text>

  <rect x="220" y="64" width="238" height="82" rx="12" fill="#0f172a"/>
  <text x="339" y="92" text-anchor="middle" class="card-title" fill="#ffffff">Current flow model v<tspan baseline-shift="sub" font-size="12">θ</tspan></text>
  <text x="339" y="113" text-anchor="middle" class="card-sub-light">sample an image trajectory</text>
  <path d="M250 130 C271 118, 292 118, 313 130 S355 142, 376 130 S418 118, 428 130" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2" stroke-linecap="round"/>

  <rect x="496" y="64" width="180" height="82" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="558" y="72" width="56" height="56" rx="6" fill="#e2e8f0" stroke="#cbd5e1" stroke-width="1"/>
  <image
    href="../img/fdfo/first_last_frames/005-r04-a-cat-floating-inside-the-international-space-st_last.png"
    x="558"
    y="72"
    width="56"
    height="56"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#generated-thumb-clip)"
  />
  <text x="586" y="141" text-anchor="middle" class="card-title-sm" fill="#0f172a">Generated Image</text>

  <rect x="714" y="64" width="222" height="82" rx="12" fill="#fff7ed" stroke="#c58b4d" stroke-width="1.5"/>
  <text x="825" y="90" text-anchor="middle" class="card-title" fill="#7c2d12">Reward Function</text>
  <text x="825" y="111" text-anchor="middle" textLength="182" lengthAdjust="spacingAndGlyphs" class="card-sub" fill="#9a3412">Learned model or human labels</text>
  <text x="825" y="127" text-anchor="middle" textLength="176" lengthAdjust="spacingAndGlyphs" class="card-sub" fill="#9a3412">map samples to scalar rewards</text>

  <line x1="184" y1="105" x2="220" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>
  <line x1="458" y1="105" x2="496" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>
  <line x1="676" y1="105" x2="714" y2="105" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>

  <path d="M825 146 L825 162 C825 170, 812 176, 796 176 L360 176 C344 176, 332 168, 332 154 L332 146" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="332,146 327,154 337,154" fill="#0f172a"/>
  <text x="579" y="196" text-anchor="middle" class="subtitle" fill="#0f172a">Use reward to update θ, then resample</text>
</svg>
</body>
</html>
