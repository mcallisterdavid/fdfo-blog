<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FDFO Post-Training Loop</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: #ffffff;
    color: #0f172a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 6px 10px;
  }
  svg {
    display: block;
    width: 100%;
    max-width: 960px;
    height: auto;
  }
  .title {
    font-size: 20px;
    font-weight: 650;
    fill: #0f172a;
  }
  .subtitle {
    font-size: 12px;
    fill: #64748b;
  }
  .card-title {
    font-size: 16px;
    font-weight: 650;
  }
  .card-sub {
    font-size: 12px;
    fill: #64748b;
  }
  .card-sub-light {
    font-size: 12px;
    fill: rgba(255, 255, 255, 0.8);
  }
  .chip {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
<svg viewBox="0 0 960 184" xmlns="http://www.w3.org/2000/svg" aria-label="FDFO post-training loop">
  <defs>
    <marker id="arrow-slate" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-ink" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0f172a"/>
    </marker>
  </defs>

  <text x="24" y="28" class="title">Post-Training Loop</text>
  <text x="24" y="46" class="subtitle">sample → score → update</text>

  <rect x="24" y="64" width="160" height="74" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="38" y="82" width="60" height="22" rx="11" fill="#e2e8f0"/>
  <rect x="104" y="82" width="52" height="22" rx="11" fill="#e2e8f0"/>
  <text x="68" y="97" text-anchor="middle" class="chip" fill="#334155">prompt c</text>
  <text x="130" y="97" text-anchor="middle" class="chip" fill="#334155">noise x₀</text>
  <text x="104" y="118" text-anchor="middle" class="card-sub">draw a rollout seed</text>

  <rect x="226" y="64" width="232" height="74" rx="12" fill="#0f172a"/>
  <text x="246" y="93" class="card-title" fill="#ffffff">Current flow model v<tspan baseline-shift="sub" font-size="12">θ</tspan></text>
  <text x="246" y="114" class="card-sub-light">sample an image trajectory</text>
  <path d="M246 125 C266 114, 286 114, 306 125 S346 136, 366 125 S406 114, 426 125" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.2" stroke-linecap="round"/>

  <rect x="500" y="64" width="158" height="74" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="544" y="82" width="70" height="38" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <polyline points="548,115 567,96 583,108 599,89 610,100" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="579" y="132" text-anchor="middle" class="card-sub">generated image x₁</text>

  <rect x="700" y="64" width="236" height="74" rx="12" fill="#fff7ed" stroke="#c58b4d" stroke-width="1.5"/>
  <text x="720" y="92" class="card-title" fill="#7c2d12">Reward signal r</text>
  <text x="720" y="112" class="card-sub" fill="#9a3412">VLM, PickScore, or human preference</text>
  <text x="720" y="128" class="card-sub" fill="#9a3412">turns the sample into a scalar objective</text>

  <line x1="184" y1="101" x2="212" y2="101" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>
  <line x1="458" y1="101" x2="486" y2="101" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>
  <line x1="658" y1="101" x2="686" y2="101" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrow-slate)"/>

  <path d="M818 138 C818 166, 520 172, 342 172 C270 172, 248 158, 248 146" fill="none" stroke="#0f172a" stroke-width="2.5" marker-end="url(#arrow-ink)"/>
  <text x="528" y="167" text-anchor="middle" class="subtitle" fill="#0f172a">use r to update θ with FDFO, then resample</text>
</svg>
</body>
</html>
