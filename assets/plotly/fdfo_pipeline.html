<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FDFO Generation Pipeline</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #FAF8F5;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            color: #050532;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .viz-container {
            width: 100%;
            max-width: 820px;
        }
        canvas {
            width: 100%;
            display: block;
            border-radius: 8px;
        }
        .play-row {
            display: flex;
            justify-content: center;
            margin-top: 14px;
            gap: 12px;
            align-items: center;
        }
        .play-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 20px;
            border: 2px solid #050532;
            border-radius: 20px;
            background: #FAF8F5;
            color: #050532;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .play-btn:hover { background: #050532; color: #FAF8F5; }
        .play-btn.active { background: #732424; border-color: #732424; color: #FAF8F5; }
        .play-btn svg { width: 14px; height: 14px; fill: currentColor; }
        .caption {
            margin-top: 10px;
            font-size: 12px;
            color: #656C75;
            text-align: center;
            line-height: 1.5;
        }
        .tooltip-box {
            position: absolute;
            background: #050532;
            color: #FAF8F5;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            line-height: 1.4;
            max-width: 220px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(5,5,50,0.3);
        }
        .tooltip-box::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent;
            border-top-color: #050532;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .play-btn { font-size: 12px; padding: 7px 16px; }
        }
    </style>
</head>
<body>
    <div class="viz-container" style="position:relative;">
        <canvas id="canvas"></canvas>
        <div class="tooltip-box" id="tooltip"></div>
        <div class="play-row">
            <button class="play-btn" id="playBtn">
                <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
                Play
            </button>
            <button class="play-btn" id="resetBtn">
                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                Reset
            </button>
        </div>
        <div class="caption">
            Click <b>Play</b> to see a sample flow through the denoising pipeline. Hover each stage for details.
            Noise is progressively removed at each step until a clean sample emerges, which is then scored by the reward model.
        </div>
    </div>

    <script>
    (function() {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('tooltip');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');

        const dpr = window.devicePixelRatio || 1;
        const W = 820, H = 220;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = '100%';
        canvas.style.maxWidth = W + 'px';
        canvas.style.aspectRatio = W + '/' + H;
        ctx.scale(dpr, dpr);

        // Colors
        const NAVY = '#050532';
        const BURGUNDY = '#732424';
        const TERRACOTTA = '#AB8064';
        const SLATE = '#656C75';
        const CREAM = '#FAF8F5';

        // Stage definitions
        const T = 6; // denoising steps
        const stages = [];
        const stageW = 72, stageH = 68;
        const arrowGap = 28;
        const totalW = (T + 3) * (stageW + arrowGap) - arrowGap; // noise + T steps + reward + score
        const startX = (W - totalW) / 2;
        const cy = H / 2 - 5;

        // Build stage list
        // Stage 0: Gaussian Noise
        stages.push({
            x: startX, y: cy - stageH / 2,
            w: stageW, h: stageH,
            label: 'x\u2080',
            sublabel: 'Noise',
            noiseLevel: 1.0,
            color: SLATE,
            tooltip: 'Gaussian noise x\u2080 ~ N(0, I)\nRandom starting point for the generation process.'
        });

        // Steps 1..T
        for (let i = 1; i <= T; i++) {
            const noiseLevel = 1.0 - i / T;
            stages.push({
                x: startX + i * (stageW + arrowGap), y: cy - stageH / 2,
                w: stageW, h: stageH,
                label: 'x\u200A' + subscript(i),
                sublabel: i === T ? 'Clean' : 'Step ' + i,
                noiseLevel: noiseLevel,
                color: i === T ? BURGUNDY : NAVY,
                tooltip: i === T
                    ? 'Clean sample x\u2081\nFinal denoised output from the flow model.'
                    : `Denoising step ${i}\nNoise level: ${(noiseLevel * 100).toFixed(0)}% remaining.\nThe velocity field v(x,t) guides the sample toward the data manifold.`
            });
        }

        // Reward model
        stages.push({
            x: startX + (T + 1) * (stageW + arrowGap), y: cy - stageH / 2,
            w: stageW, h: stageH,
            label: 'R(\u00B7)',
            sublabel: 'Reward',
            noiseLevel: -1, // special
            color: TERRACOTTA,
            tooltip: 'Reward model R(x\u2081)\nEvaluates the quality of the generated sample.\nCould be an aesthetic scorer, CLIP model, etc.'
        });

        // Score
        stages.push({
            x: startX + (T + 2) * (stageW + arrowGap), y: cy - stageH / 2,
            w: stageW, h: stageH,
            label: 'r',
            sublabel: 'Score',
            noiseLevel: -2, // special
            color: BURGUNDY,
            tooltip: 'Scalar reward score r = R(x\u2081)\nThis gradient signal is backpropagated through the Jacobian to improve earlier steps.'
        });

        function subscript(n) {
            const subs = '\u2080\u2081\u2082\u2083\u2084\u2085\u2086\u2087\u2088\u2089';
            return String(n).split('').map(d => subs[parseInt(d)]).join('');
        }

        // Noise pattern for a box
        function drawNoise(x, y, w, h, level, seed) {
            if (level <= 0) return;
            const rng = mulberry32(seed);
            const dotCount = Math.round(level * 120);
            const radius = 1.5;
            ctx.fillStyle = 'rgba(5,5,50,0.15)';
            for (let i = 0; i < dotCount; i++) {
                const dx = x + 4 + rng() * (w - 8);
                const dy = y + 4 + rng() * (h - 8);
                ctx.beginPath();
                ctx.arc(dx, dy, radius * (0.5 + rng() * 0.5), 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Simple seeded RNG
        function mulberry32(a) {
            return function() {
                a |= 0; a = a + 0x6D2B79F5 | 0;
                var t = Math.imul(a ^ a >>> 15, 1 | a);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }

        // Gradient fill for "clean" appearance
        function drawCleanGradient(x, y, w, h) {
            const grad = ctx.createRadialGradient(x + w/2, y + h/2, 0, x + w/2, y + h/2, w * 0.6);
            grad.addColorStop(0, 'rgba(115,36,36,0.08)');
            grad.addColorStop(1, 'rgba(171,128,100,0.04)');
            ctx.fillStyle = grad;
            ctx.fillRect(x + 3, y + 3, w - 6, h - 6);
        }

        // Animation state
        let particleProgress = -1; // -1 = not animating
        let animating = false;
        let animFrame = null;

        function drawArrow(fromX, fromY, toX, toY, highlighted) {
            const headLen = 8;
            const angle = Math.atan2(toY - fromY, toX - fromX);
            ctx.strokeStyle = highlighted ? BURGUNDY : NAVY;
            ctx.lineWidth = highlighted ? 2 : 1.5;
            ctx.globalAlpha = highlighted ? 1 : 0.4;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX - headLen * Math.cos(angle), toY - headLen * Math.sin(angle));
            ctx.stroke();

            // Arrowhead
            ctx.fillStyle = highlighted ? BURGUNDY : NAVY;
            ctx.beginPath();
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headLen * Math.cos(angle - 0.35), toY - headLen * Math.sin(angle - 0.35));
            ctx.lineTo(toX - headLen * Math.cos(angle + 0.35), toY - headLen * Math.sin(angle + 0.35));
            ctx.closePath();
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        function render() {
            ctx.fillStyle = CREAM;
            ctx.fillRect(0, 0, W, H);

            // Arrows between stages
            for (let i = 0; i < stages.length - 1; i++) {
                const s1 = stages[i], s2 = stages[i + 1];
                const fromX = s1.x + s1.w;
                const toX = s2.x;
                const midY = s1.y + s1.h / 2;
                const highlighted = particleProgress >= 0 && i <= Math.floor(particleProgress);
                drawArrow(fromX + 4, midY, toX - 4, midY, highlighted);
            }

            // Draw stages
            for (let i = 0; i < stages.length; i++) {
                const s = stages[i];
                const isActive = particleProgress >= 0 && Math.abs(i - Math.round(particleProgress)) < 0.5;

                // Shadow
                if (isActive) {
                    ctx.shadowColor = 'rgba(115,36,36,0.25)';
                    ctx.shadowBlur = 10;
                    ctx.shadowOffsetY = 2;
                }

                // Box
                ctx.fillStyle = CREAM;
                ctx.strokeStyle = s.color;
                ctx.lineWidth = isActive ? 2.5 : 1.5;
                ctx.beginPath();
                ctx.roundRect(s.x, s.y, s.w, s.h, 8);
                ctx.fill();
                ctx.stroke();

                ctx.shadowColor = 'transparent';
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // Noise pattern or clean fill
                if (s.noiseLevel > 0) {
                    drawNoise(s.x, s.y, s.w, s.h, s.noiseLevel, (i + 1) * 12345);
                } else if (s.noiseLevel === 0) {
                    drawCleanGradient(s.x, s.y, s.w, s.h);
                } else if (s.noiseLevel === -1) {
                    // Reward model: draw a small "function" icon
                    ctx.strokeStyle = TERRACOTTA;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    const cx = s.x + s.w / 2, cyBox = s.y + s.h / 2;
                    // Sine wave
                    for (let p = -12; p <= 12; p++) {
                        const px = cx + p;
                        const py = cyBox + Math.sin(p * 0.3) * 6;
                        if (p === -12) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                } else if (s.noiseLevel === -2) {
                    // Score: draw a number
                    ctx.fillStyle = BURGUNDY;
                    ctx.font = 'bold 20px Helvetica Neue, Helvetica, Arial, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    if (particleProgress >= stages.length - 1.5) {
                        ctx.fillText('0.87', s.x + s.w / 2, s.y + s.h / 2 + 2);
                    }
                }

                // Label
                ctx.fillStyle = s.color;
                ctx.font = 'bold 14px Helvetica Neue, Helvetica, Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(s.label, s.x + s.w / 2, s.y - 4);

                // Sublabel
                ctx.fillStyle = SLATE;
                ctx.font = '11px Helvetica Neue, Helvetica, Arial, sans-serif';
                ctx.textBaseline = 'top';
                ctx.fillText(s.sublabel, s.x + s.w / 2, s.y + s.h + 4);
            }

            // Draw particle if animating
            if (particleProgress >= 0 && particleProgress < stages.length) {
                const idx = Math.min(Math.floor(particleProgress), stages.length - 1);
                const frac = particleProgress - idx;
                let px, py;

                if (idx < stages.length - 1) {
                    const s1 = stages[idx], s2 = stages[idx + 1];
                    // Interpolate from center of s1 to center of s2
                    const x1 = s1.x + s1.w / 2, y1 = s1.y + s1.h / 2;
                    const x2 = s2.x + s2.w / 2, y2 = s2.y + s2.h / 2;
                    px = x1 + (x2 - x1) * frac;
                    py = y1 + (y2 - y1) * frac;
                } else {
                    const s = stages[idx];
                    px = s.x + s.w / 2;
                    py = s.y + s.h / 2;
                }

                // Glow
                ctx.fillStyle = 'rgba(115,36,36,0.15)';
                ctx.beginPath();
                ctx.arc(px, py, 14, 0, Math.PI * 2);
                ctx.fill();

                // Particle
                ctx.fillStyle = BURGUNDY;
                ctx.strokeStyle = CREAM;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(px, py, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            // Bottom flow label
            ctx.fillStyle = NAVY;
            ctx.font = '11px Helvetica Neue, Helvetica, Arial, sans-serif';
            ctx.textAlign = 'center';
            const bracketLeft = stages[1].x;
            const bracketRight = stages[T].x + stages[T].w;
            const bracketY = stages[0].y + stages[0].h + 22;

            // Bracket
            ctx.strokeStyle = NAVY;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.4;
            ctx.beginPath();
            ctx.moveTo(bracketLeft, bracketY);
            ctx.lineTo(bracketLeft, bracketY + 6);
            ctx.lineTo(bracketRight, bracketY + 6);
            ctx.lineTo(bracketRight, bracketY);
            ctx.stroke();

            // Bracket label
            ctx.globalAlpha = 0.6;
            ctx.fillText('T denoising steps (ODE/SDE)', (bracketLeft + bracketRight) / 2, bracketY + 18);
            ctx.globalAlpha = 1;
        }

        // Animation
        let animStart = null;
        const animDuration = 3000; // ms

        function animateLoop(ts) {
            if (!animStart) animStart = ts;
            const elapsed = ts - animStart;
            const totalStages = stages.length;
            particleProgress = Math.min((elapsed / animDuration) * totalStages, totalStages - 0.01);

            render();

            if (elapsed < animDuration) {
                animFrame = requestAnimationFrame(animateLoop);
            } else {
                particleProgress = totalStages - 1;
                render();
                animating = false;
                playBtn.classList.remove('active');
                playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg> Play';
            }
        }

        playBtn.addEventListener('click', function() {
            if (animating) {
                // Stop
                cancelAnimationFrame(animFrame);
                animating = false;
                playBtn.classList.remove('active');
                playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg> Play';
                return;
            }
            particleProgress = 0;
            animStart = null;
            animating = true;
            playBtn.classList.add('active');
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> Pause';
            animFrame = requestAnimationFrame(animateLoop);
        });

        resetBtn.addEventListener('click', function() {
            if (animating) {
                cancelAnimationFrame(animFrame);
                animating = false;
                playBtn.classList.remove('active');
                playBtn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg> Play';
            }
            particleProgress = -1;
            render();
        });

        // Hover tooltips
        let hoveredStage = -1;

        canvas.addEventListener('mousemove', function(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleX;

            let found = -1;
            for (let i = 0; i < stages.length; i++) {
                const s = stages[i];
                if (mx >= s.x && mx <= s.x + s.w && my >= s.y && my <= s.y + s.h) {
                    found = i;
                    break;
                }
            }

            if (found !== hoveredStage) {
                hoveredStage = found;
                if (found >= 0) {
                    const s = stages[found];
                    tooltip.textContent = s.tooltip;
                    // Position tooltip
                    const stageScreenX = s.x / scaleX + rect.left - rect.left;
                    const stageScreenY = s.y / scaleX;
                    tooltip.style.left = (s.x / scaleX + s.w / (2 * scaleX) - tooltip.offsetWidth / 2) + 'px';
                    tooltip.style.top = (s.y / scaleX - tooltip.offsetHeight - 14) + 'px';
                    tooltip.style.opacity = '1';
                    tooltip.style.whiteSpace = 'pre-line';
                    canvas.style.cursor = 'pointer';
                } else {
                    tooltip.style.opacity = '0';
                    canvas.style.cursor = 'default';
                }
            }
        });

        canvas.addEventListener('mouseleave', function() {
            hoveredStage = -1;
            tooltip.style.opacity = '0';
            canvas.style.cursor = 'default';
        });

        // Initial render
        render();
    })();
    </script>
</body>
</html>
